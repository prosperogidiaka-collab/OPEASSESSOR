<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Certificate Preview - EGUASA</title>
  <style>body{margin:0;background:#f2f6fb;padding:20px 0;display:flex;justify-content:center}</style>
</head>
<body>
  <div id="preview-root"></div>
  <script src="app.js"></script>
  <script>
    (function(){
      // Build sample quiz + submission payload
      const quiz = {
        title: 'PHYSICS QUIZ',
        examName: 'OGIDIAKA EDUCATIONAL FOUNDATION',
        showTopicsAfterSubmission: false
      };
      const submission = {
        name: 'EGUASA',
        score: 42,
        percent: 60,
        correctCount: 42,
        attemptedCount: 59,
        wrongCount: 17,
        allQuestions: Array(59).fill({}),
        subjectBreakdown: [
          { name: 'Physics', score: 42, totalMarks: 70, percent: 60, correct: 42, attempted: 59, total: 70, wrong: 17 }
        ]
      };
      // Wait a tick for app.js to define functions
      function render(){
        try{
          const totalMarks = (submission.subjectBreakdown && submission.subjectBreakdown[0] && submission.subjectBreakdown[0].totalMarks) || 70;
          const scoreText = `${submission.score} / ${totalMarks}`;
          const percent = submission.percent || 0;
          const gradeProfile = (typeof getCertificateGradeProfile === 'function') ? getCertificateGradeProfile(percent) : { label: 'Pass' };
          const css = (typeof getCertificateResultCss === 'function') ? getCertificateResultCss() : '';
          const html = `
            <div style="font-family:Segoe UI, Noto Sans, Arial, sans-serif;padding:24px;display:flex;justify-content:center">
              <style>${css}</style>
              <div class="cert-performance-box" style="background:#EAF6FF;border:1px solid rgba(47,128,237,.12);border-radius:12px;padding:18px;width:420px">
                <div class="cert-section-title" style="font-weight:900;color:#0B3D91">Performance Overview</div>
                <div class="cert-performance-list-plain" style="margin-top:12px;font-weight:800;color:#0F172A">
                  <div>Total Score: ${escapeHtml(scoreText)}</div>
                  <div style="margin-top:8px">Percentage: ${percent}%</div>
                  <div style="margin-top:8px">Result: ${escapeHtml(gradeProfile.label)}</div>
                </div>
              </div>
            </div>
          `;
          document.getElementById('preview-root').innerHTML = html;
        }catch(e){
          document.getElementById('preview-root').textContent = 'Preview failed: ' + e.message;
          console.error(e);
        }
      }
      if (typeof getCertificateResultCss === 'function') render(); else window.addEventListener('load', render);
    })();
  </script>
</body>
</html>
